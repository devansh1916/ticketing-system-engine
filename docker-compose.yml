services:
    postgres:
      image: postgres:15-alpine
      container_name: ticketing_db
      environment:
          POSTGRES_USER: ${DB_USER}
          POSTGRES_PASSWORD: ${DB_PASSWORD}
          POSTGRES_DB: ${DB_NAME}
      ports:
          - "${DB_PORT}:5432"
      volumes:
          - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql